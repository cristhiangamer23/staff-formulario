<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Postulaciones | RR.HH. Buenos Aires RP</title>

<style>

/* =========================
   BASE
========================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0b1220;
    color:white;
}

/* =========================
   HEADER
========================= */
header{
    background:#111827;
    padding:18px;
    font-size:18px;
    font-weight:bold;
    border-bottom:1px solid #1f2937;
}

/* =========================
   CONTAINER
========================= */
.container{
    max-width:1000px;
    margin:auto;
    padding:25px;
}

/* =========================
   CARD
========================= */
.card{
    background:#1e293b;
    padding:20px;
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

/* =========================
   ITEM
========================= */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#0f172a;
    padding:15px;
    border-radius:12px;
    margin-top:12px;
    border:1px solid #1f2937;
}

.name{
    font-weight:bold;
    font-size:16px;
}

.small{
    color:#94a3b8;
    font-size:13px;
}

/* =========================
   BUTTONS
========================= */
button{
    border:none;
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    color:white;
    margin-left:5px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.view{ background:#16a34a; }
.rate{ background:#2563eb; }

/* =========================
   EMPTY
========================= */
.empty{
    text-align:center;
    color:#94a3b8;
    padding:30px;
}

/* =========================
   MODAL PRO
========================= */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#1e293b;
    padding:25px;
    border-radius:14px;
    width:90%;
    max-width:650px;
    max-height:80vh;
    overflow:auto;
    border:1px solid #334155;
}

.close{
    float:right;
    cursor:pointer;
    font-size:18px;
    color:#ef4444;
}

pre{
    white-space:pre-wrap;
    color:#e5e7eb;
    font-size:14px;
    line-height:1.5;
}

.title{
    font-size:18px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<header>
📂 Postulaciones Recibidas
</header>

<div class="container">

<div class="card">
<h3>Lista de postulantes</h3>
<div id="lista"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">

<div class="modal-content">

<span class="close" onclick="cerrarModal()">✖</span>

<div class="title">📄 Detalles de Postulación</div>

<pre id="modalTexto"></pre>

</div>

</div>

<script>

/* =========================
   LOGIN CHECK
========================= */
if(!localStorage.getItem("sesion")){
    window.location.href = "login.html";
}

/* =========================
   DATA
========================= */
let postulaciones =
JSON.parse(localStorage.getItem("postulaciones")) || [];

const lista = document.getElementById("lista");

/* =========================
   RENDER
========================= */
function render(){

    lista.innerHTML = "";

    if(postulaciones.length === 0){
        lista.innerHTML = `
        <div class="empty">
            No hay postulaciones registradas.
        </div>`;
        return;
    }

    postulaciones.forEach((p,index)=>{

        lista.innerHTML += `
        <div class="item">

            <div>
                <div class="name">${p.nombre}</div>
                <div class="small">📧 ${p.discord}</div>
                <div class="small">📅 ${p.fecha}</div>
            </div>

            <div>

                <button class="view" onclick="ver(${index})">
                    Ver
                </button>

                <button class="rate" onclick="calificar(${index})">
                    Calificar
                </button>

            </div>

        </div>`;
    });

}

/* =========================
   VER MODAL
========================= */
function ver(index){

    const p = postulaciones[index];

    let texto = `Nombre: ${p.nombre}\nDiscord: ${p.discord}\n\n`;

    p.respuestas.forEach(r=>{
        texto += `• ${r.pregunta}: ${r.respuesta}\n`;
    });

    document.getElementById("modalTexto").innerText = texto;
    document.getElementById("modal").style.display = "flex";
}

/* =========================
   CERRAR MODAL
========================= */
function cerrarModal(){
    document.getElementById("modal").style.display = "none";
}

/* =========================
   CALIFICAR
========================= */
function calificar(index){

    localStorage.setItem(
        "postulacion_actual",
        JSON.stringify(postulaciones[index])
    );

    window.location.href = "calificaciones.html";
}

/* =========================
   INIT
========================= */
render();

/* =========================
   FIX MODAL BUG
========================= */
window.addEventListener("pageshow",()=>{
    document.getElementById("modal").style.display="none";
});

</script>

</body>
</html>
