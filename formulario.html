<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario Staff | Buenos Aires RP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input, textarea, select{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

button{
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    color:white;
}

.primary{
    background:#2563eb;
}

.success{
    background:#16a34a;
}

.danger{
    background:#dc2626;
}

.question{
    background:#334155;
    padding:15px;
    border-radius:10px;
    margin-top:10px;
}

.option{
    margin-top:5px;
    color:#cbd5e1;
}

</style>
</head>

<body>

<header>
<h2>📝 Constructor de Formulario Staff</h2>
</header>

<div class="container">

<div class="card">

<h3>Nueva Pregunta</h3>

<br>

<label>Pregunta</label>

<input
type="text"
id="pregunta"
placeholder="Escribe la pregunta">

<label>Tipo</label>

<select id="tipo">

<option value="texto">
Texto
</option>

<option value="opcion">
Opción Múltiple
</option>

</select>

<label>
Opciones (separadas por coma)
</label>

<textarea
id="opciones"
placeholder="Sí,No,Tal vez">
</textarea>

<button
class="primary"
onclick="agregarPregunta()">

➕ Agregar Pregunta

</button>

<button
class="success"
onclick="guardarFormulario()">

💾 Guardar Formulario

</button>

<button
class="danger"
onclick="borrarFormulario()">

🗑️ Borrar Todo

</button>

</div>

<div class="card">

<h3>Vista Previa</h3>

<div id="preview"></div>

</div>

</div>

<script>

if(!localStorage.getItem("sesion")){

    window.location.href =
    "login.html";

}

let preguntas =
JSON.parse(
localStorage.getItem("preguntas")
) || [];

function render(){

    const preview =
    document.getElementById(
    "preview"
    );

    preview.innerHTML = "";

    if(
    preguntas.length === 0
    ){

        preview.innerHTML =
        "<p>No hay preguntas.</p>";

        return;
    }

    preguntas.forEach(
    (p,index)=>{

        let html = `
        <div class="question">

        <strong>
        ${index+1}. ${p.texto}
        </strong>
        <br><br>
        `;

        if(
        p.tipo === "texto"
        ){

            html += `
            <input
            disabled
            placeholder="Respuesta">
            `;

        }else{

            p.opciones.forEach(
            op=>{

                html += `
                <div class="option">
                ○ ${op}
                </div>
                `;

            });

        }

        html += `
        <br>

        <button
        class="danger"
        onclick="eliminarPregunta(${index})">

        Eliminar

        </button>

        </div>
        `;

        preview.innerHTML += html;

    });

}

function agregarPregunta(){

    const pregunta =
    document
    .getElementById(
    "pregunta"
    )
    .value
    .trim();

    const tipo =
    document
    .getElementById(
    "tipo"
    )
    .value;

    const opciones =
    document
    .getElementById(
    "opciones"
    )
    .value
    .trim();

    if(!pregunta){

        alert(
        "Debes escribir una pregunta."
        );

        return;
    }

    let nueva = {

        texto:pregunta,
        tipo:tipo,
        opciones:[]
    };

    if(
    tipo === "opcion"
    ){

        nueva.opciones =
        opciones
        .split(",")
        .map(
        x=>x.trim()
        )
        .filter(
        x=>x
        );

    }

    preguntas.push(
    nueva
    );

    document
    .getElementById(
    "pregunta"
    )
    .value = "";

    document
    .getElementById(
    "opciones"
    )
    .value = "";

    render();

}

function guardarFormulario(){

    localStorage.setItem(
    "preguntas",
    JSON.stringify(
    preguntas
    )
    );

    alert(
    "Formulario guardado correctamente."
    );

}

function borrarFormulario(){

    if(
    !confirm(
    "¿Eliminar todas las preguntas?"
    )
    ) return;

    preguntas = [];

    localStorage.setItem(
    "preguntas",
    JSON.stringify([])
    );

    render();

}

function eliminarPregunta(index){

    preguntas.splice(
    index,
    1
    );

    render();

}

render();

</script>

</body>
</html>
