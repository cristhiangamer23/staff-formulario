<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin RR.HH | Form Builder</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:15px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:8px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin-top:5px;
}

.primary{background:#2563eb;}
.success{background:#16a34a;}
.publish{background:#f59e0b;}
.danger{background:#dc2626;}

.item{
    background:#334155;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>🧩 Constructor de Formulario</h2>

<input id="pregunta" placeholder="Escribe la pregunta">

<select id="tipo">
<option value="texto">Texto</option>
<option value="opcion">Opción múltiple</option>
</select>

<textarea id="opciones" placeholder="Opciones separadas por coma (solo si es opción múltiple)"></textarea>

<button class="primary" onclick="agregar()">Agregar pregunta</button>
<button class="success" onclick="guardarBorrador()">Guardar borrador</button>
<button class="publish" onclick="publicar()">📢 Publicar formulario</button>
</div>

<div class="card">
<h3>📋 Preguntas actuales</h3>
<div id="lista"></div>
</div>

</div>

<script>

/* =====================
   "BASE DE DATOS LOCAL"
===================== */
let preguntas = JSON.parse(localStorage.getItem("form_borrador")) || [];

/* =====================
   AGREGAR
===================== */
function agregar(){

let p = document.getElementById("pregunta").value;
let t = document.getElementById("tipo").value;
let o = document.getElementById("opciones").value;

if(!p){
alert("Escribe una pregunta");
return;
}

preguntas.push({
texto: p,
tipo: t,
opciones: t === "opcion"
? o.split(",").map(x => x.trim()).filter(x => x)
: []
});

document.getElementById("pregunta").value = "";
document.getElementById("opciones").value = "";

render();
}

/* =====================
   GUARDAR BORRADOR
===================== */
function guardarBorrador(){
localStorage.setItem("form_borrador", JSON.stringify(preguntas));
alert("Borrador guardado ✔");
}

/* =====================
   ELIMINAR
===================== */
function eliminar(i){
preguntas.splice(i,1);
render();
}

/* =====================
   PUBLICAR FORMULARIO
===================== */
function publicar(){

if(preguntas.length === 0){
alert("No hay preguntas para publicar");
return;
}

/* 🔥 ESTO ES TU "BASE DE DATOS ACTIVA" */
localStorage.setItem("formulario_activo", JSON.stringify(preguntas));

/* estado del sistema */
localStorage.setItem("estado_formulario", "publicado");

/* timestamp opcional */
localStorage.setItem("ultima_publicacion", Date.now());

alert("✔ Formulario publicado correctamente");

/* abre el formulario público */
window.open("formulario.html", "_blank");
}

/* =====================
   RENDER
===================== */
function render(){

let html = "";

preguntas.forEach((p,i)=>{

html += `
<div class="item">
<b>${p.texto}</b><br>
<small>${p.tipo}</small><br>
<button class="danger" onclick="eliminar(${i})">Eliminar</button>
</div>
`;

});

document.getElementById("lista").innerHTML = html;
}

render();

</script>

</body>
</html>
