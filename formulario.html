<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario Staff | Buenos Aires RP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

button{
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin-top:5px;
}

.primary{background:#2563eb;}
.success{background:#16a34a;}
.danger{background:#dc2626;}
.publish{background:#f59e0b;}

.question{
    background:#334155;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:90%;
    max-width:600px;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
}

.close{
    float:right;
    cursor:pointer;
    color:red;
    font-size:20px;
}

</style>
</head>

<body>

<header>
<h2>📝 Constructor de Formulario RR.HH.</h2>
</header>

<div class="container">

<!-- CREAR PREGUNTA -->
<div class="card">

<h3>Crear Pregunta</h3>

<input id="pregunta" placeholder="Escribe la pregunta">

<select id="tipo">
<option value="texto">Texto</option>
<option value="opcion">Opción múltiple</option>
</select>

<textarea id="opciones" placeholder="Opciones separadas por coma"></textarea>

<button class="primary" onclick="agregar()">Agregar</button>
<button class="success" onclick="guardar()">Guardar</button>
<button class="publish" onclick="publicar()">📢 Publicar</button>

</div>

<!-- LISTA -->
<div class="card">
<h3>Preguntas</h3>
<div id="lista"></div>
</div>

</div>

<!-- MODAL PUBLICAR -->
<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="cerrar()">✖</span>

<h2>📢 Formulario Publicado</h2>

<p>Link público:</p>

<input id="link" readonly>

<br><br>

<button class="success" onclick="copiar()">📋 Copiar Link</button>
<button class="primary" onclick="abrir()">🔗 Abrir</button>

</div>

</div>

<script>

/* =========================
   CARGAR PREGUNTAS
========================= */
let preguntas = JSON.parse(localStorage.getItem("preguntas")) || [];

/* =========================
   AGREGAR PREGUNTA
========================= */
function agregar(){

let p = document.getElementById("pregunta").value;
let t = document.getElementById("tipo").value;
let o = document.getElementById("opciones").value;

if(!p) return alert("Escribe una pregunta");

let nueva = {
texto:p,
tipo:t,
opciones: t === "opcion"
? o.split(",").map(x=>x.trim())
: []
};

preguntas.push(nueva);
render();

}

/* =========================
   GUARDAR
========================= */
function guardar(){
localStorage.setItem("preguntas", JSON.stringify(preguntas));
alert("Formulario guardado");
}

/* =========================
   ELIMINAR
========================= */
function eliminar(i){
preguntas.splice(i,1);
render();
}

/* =========================
   RENDER
========================= */
function render(){

let html = "";

preguntas.forEach((p,i)=>{

html += `
<div class="question">
<b>${p.texto}</b>
<br>
<small>${p.tipo}</small>
<br>
<button class="danger" onclick="eliminar(${i})">Eliminar</button>
</div>
`;

});

document.getElementById("lista").innerHTML = html;

}

/* =========================
   🔥 PUBLICAR (CORREGIDO)
========================= */
function publicar(){

const estado = localStorage.getItem("estado_postulacion");

if(estado !== "abierta"){
alert("❌ No puedes publicar porque las postulaciones están cerradas.");
return;
}

let url = window.location.origin + "/buenosaires/postulacion/";

document.getElementById("link").value = url;

document.getElementById("modal").style.display = "flex";

}

/* =========================
   COPIAR LINK
========================= */
function copiar(){

let input = document.getElementById("link");

input.select();
document.execCommand("copy");

alert("Link copiado");

}

/* =========================
   ABRIR LINK
========================= */
function abrir(){
window.open(document.getElementById("link").value, "_blank");
}

/* =========================
   CERRAR MODAL
========================= */
function cerrar(){
document.getElementById("modal").style.display = "none";
}

render();

</script>

</body>
</html>
