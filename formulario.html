<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulario Staff | Buenos Aires RP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#0f172a;
    color:white;
}

header{
    background:#111827;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
}

button{
    border:none;
    padding:10px 15px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    margin-top:5px;
}

.primary{background:#2563eb;}
.success{background:#16a34a;}
.danger{background:#dc2626;}
.publish{background:#f59e0b;}

.question{
    background:#334155;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-content{
    width:90%;
    max-width:700px;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    max-height:80vh;
    overflow:auto;
}

.close{
    float:right;
    cursor:pointer;
    color:red;
    font-size:20px;
}

</style>
</head>

<body>

<header>
<h2>📝 Constructor de Formulario</h2>
</header>

<div class="container">

<div class="card">

<h3>Crear Pregunta</h3>

<input id="pregunta" placeholder="Escribe la pregunta">

<select id="tipo">
<option value="texto">Texto</option>
<option value="opcion">Opción múltiple</option>
</select>

<textarea id="opciones" placeholder="Opciones separadas por coma"></textarea>

<button class="primary" onclick="agregar()">Agregar</button>
<button class="success" onclick="guardar()">Guardar</button>
<button class="publish" onclick="publicar()">📢 Publicar</button>

</div>

<div class="card">
<h3>Preguntas</h3>
<div id="lista"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<span class="close" onclick="cerrar()">✖</span>

<h2>📋 Vista del Formulario Público</h2>

<div id="vista"></div>

</div>

</div>

<script>

let preguntas = JSON.parse(localStorage.getItem("preguntas")) || [];

/* AGREGAR PREGUNTA */
function agregar(){

let p = document.getElementById("pregunta").value;
let t = document.getElementById("tipo").value;
let o = document.getElementById("opciones").value;

if(!p) return alert("Escribe una pregunta");

let nueva = {
texto:p,
tipo:t,
opciones: t === "opcion" ? o.split(",") : []
};

preguntas.push(nueva);
render();

}

/* GUARDAR */
function guardar(){
localStorage.setItem("preguntas", JSON.stringify(preguntas));
alert("Guardado");
}

/* ELIMINAR */
function eliminar(i){
preguntas.splice(i,1);
render();
}

/* RENDER */
function render(){

let html = "";

preguntas.forEach((p,i)=>{

html += `
<div class="question">
<b>${p.texto}</b>
<br>
<small>${p.tipo}</small>
<br>
<button class="danger" onclick="eliminar(${i})">Eliminar</button>
</div>
`;

});

document.getElementById("lista").innerHTML = html;

}

/* PUBLICAR (NUEVO) */
function publicar(){

let vista = "";

preguntas.forEach((p,i)=>{

vista += `<div style="margin-bottom:15px;">`;
vista += `<b>${p.texto}</b><br>`;

if(p.tipo === "texto"){
vista += `<input disabled placeholder="Respuesta">`;
}else{
p.opciones.forEach(op=>{
vista += `<div>○ ${op}</div>`;
});
}

vista += `</div>`;
});

document.getElementById("vista").innerHTML = vista;

document.getElementById("modal").style.display = "flex";

}

/* CERRAR MODAL */
function cerrar(){
document.getElementById("modal").style.display = "none";
}

render();

</script>

</body>
</html>
