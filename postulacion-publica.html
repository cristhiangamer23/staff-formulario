<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Postulación Staff | Buenos Aires RP</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#eef2ff;
}

.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:20px;
}

label{
    font-weight:bold;
    display:block;
    margin-bottom:8px;
}

input[type="text"], textarea{
    width:100%;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
}

textarea{
    resize:none;
}

.question{
    margin-bottom:25px;
    padding:15px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    background:#f9fafb;
}

.options label{
    display:block;
    margin-top:8px;
    font-weight:normal;
    cursor:pointer;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#1d4ed8;
}

.error{
    color:red;
    font-size:13px;
    display:none;
}

.success{
    text-align:center;
    font-size:18px;
    color:#16a34a;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="card" id="formulario">

<h1>🛡️ Postulación Staff</h1>
<div class="subtitle">Buenos Aires RP</div>

<div class="form-group">
<label>Nombre completo *</label>
<input type="text" id="nombre">
<div class="error" id="err_nombre">Este campo es obligatorio</div>
</div>

<div class="form-group">
<label>Discord *</label>
<input type="text" id="discord">
<div class="error" id="err_discord">Este campo es obligatorio</div>
</div>

<div id="preguntas"></div>

<button onclick="enviar()">Enviar Postulación</button>

</div>

</div>

<script>

/* =========================
   PREGUNTAS (tipo Google Forms)
========================= */
const preguntas = [
{
    texto:"¿Cuántas horas puedes estar activo?",
    tipo:"texto"
},
{
    texto:"¿Tienes experiencia en servidores RP?",
    tipo:"opcion",
    opciones:["Sí","No"]
},
{
    texto:"¿Por qué quieres ser staff?",
    tipo:"texto"
}
];

/* =========================
   RENDER FORM
========================= */
const cont = document.getElementById("preguntas");

preguntas.forEach((p,i)=>{

let html = `<div class="question">
<label>${i+1}. ${p.texto} *</label>`;

if(p.tipo === "texto"){
html += `
<textarea id="q_${i}"></textarea>
<div class="error" id="err_q_${i}">Obligatorio</div>
`;
}else{
html += `<div class="options">`;

p.opciones.forEach(op=>{
html += `
<label>
<input type="radio" name="q_${i}" value="${op}">
${op}
</label>
`;
});

html += `
</div>
<div class="error" id="err_q_${i}">Selecciona una opción</div>
`;
}

html += `</div>`;

cont.innerHTML += html;

});

/* =========================
   VALIDACIÓN + ENVÍO
========================= */
function enviar(){

let ok = true;

const nombre = document.getElementById("nombre").value.trim();
const discord = document.getElementById("discord").value.trim();

/* validar nombre */
if(!nombre){
document.getElementById("err_nombre").style.display="block";
ok=false;
}else{
document.getElementById("err_nombre").style.display="none";
}

/* validar discord */
if(!discord){
document.getElementById("err_discord").style.display="block";
ok=false;
}else{
document.getElementById("err_discord").style.display="none";
}

/* validar preguntas */
let respuestas = [];

preguntas.forEach((p,i)=>{

if(p.tipo==="texto"){
const val = document.getElementById("q_"+i).value.trim();

if(!val){
document.getElementById("err_q_"+i).style.display="block";
ok=false;
}else{
document.getElementById("err_q_"+i).style.display="none";
}

respuestas.push({pregunta:p.texto,respuesta:val});

}else{

const sel = document.querySelector(`input[name="q_${i}"]:checked`);

if(!sel){
document.getElementById("err_q_"+i).style.display="block";
ok=false;
}else{
document.getElementById("err_q_"+i).style.display="none";
respuestas.push({pregunta:p.texto,respuesta:sel.value});
}

}

});

if(!ok) return;

/* guardar */
let data = JSON.parse(localStorage.getItem("postulaciones")) || [];

data.push({
id:Date.now(),
nombre,
discord,
fecha:new Date().toLocaleDateString(),
respuestas
});

localStorage.setItem("postulaciones",JSON.stringify(data));

/* mensaje final */
document.getElementById("formulario").innerHTML = `
<div class="success">
🎉 ¡Postulación enviada correctamente!
</div>
`;

}

</script>

</body>
</html>
