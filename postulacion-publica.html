<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Postulación Staff</title>

<style>

/* ===== BASE ===== */
body{
    margin:0;
    font-family:Arial;
    background:#0b1220;
    color:white;
}

/* ===== CENTER ===== */
.wrap{
    max-width:850px;
    margin:50px auto;
    padding:20px;
}

/* ===== CARD ===== */
.card{
    background:#111827;
    padding:30px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* TITLE */
h1{
    text-align:center;
    margin-bottom:5px;
}

.sub{
    text-align:center;
    color:#94a3b8;
    margin-bottom:25px;
}

/* FORM AREA */
#form{
    margin-top:20px;
}

/* INPUTS */
input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    margin-top:20px;
    background:#2563eb;
    color:white;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* STATUS */
.status{
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

.open{color:#22c55e;}
.closed{color:#ef4444;}

/* BLOCK */
.block{
    text-align:center;
    padding:40px;
}

</style>
</head>

<body>

<div class="wrap">
<div class="card" id="app"></div>
</div>

<script>

/* =========================
   ESTADO
========================= */
let estado = localStorage.getItem("estado_postulacion") || "cerrada";

/* =========================
   BLOQUEADO
========================= */
if(estado !== "abierta"){

document.getElementById("app").innerHTML = `
<div class="block">
    <h2 class="closed">🚫 Cerrado</h2>
    <p>Las postulaciones están actualmente cerradas.</p>
</div>
`;

}else{

/* =========================
   FORM BASE (VACÍO)
========================= */
document.getElementById("app").innerHTML = `

<h1>🛡 Postulación Staff</h1>
<div class="sub">Sistema Buenos Aires RP</div>

<div class="status open">🟢 ABIERTA</div>

<div id="form"></div>

<button onclick="send()">Enviar Postulación</button>

`;

/* =========================
   ENVÍO
========================= */
window.send = function(){
    alert("Postulación enviada (formulario dinámico listo para conectar)");
};

}

</script>

</body>
</html>
