<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Postulación Staff | Buenos Aires RP</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#eef2ff;
}

.container{
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:20px;
}

#form-area{
    margin-top:20px;
}

/* inputs base */
input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

/* botón */
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    margin-top:20px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

/* bloqueado */
.blocked{
    text-align:center;
    padding:40px;
}

.blocked h2{
    color:#dc2626;
}

.blocked p{
    color:#6b7280;
}

</style>
</head>

<body>

<div class="container">
<div class="card" id="app">

<!-- CONTENIDO DINÁMICO -->

</div>
</div>

<script>

/* =========================
   ESTADO DEL SISTEMA
========================= */
let estado = localStorage.getItem("estado_postulacion") || "cerrada";

/* =========================
   SI ESTÁ CERRADO
========================= */
if(estado !== "abierta"){

document.getElementById("app").innerHTML = `
<div class="blocked">

<h2>🚫 Postulaciones cerradas</h2>

<p>
En este momento no estamos aceptando nuevas postulaciones.
</p>

<p>
Intenta más tarde cuando el sistema esté abierto.
</p>

</div>
`;

}else{

/* =========================
   FORMULARIO VACÍO (DINÁMICO)
========================= */
document.getElementById("app").innerHTML = `

<h1>🛡️ Postulación Staff</h1>
<div class="subtitle">Buenos Aires RP</div>

<div id="form-area">
<!-- aquí tú insertas preguntas desde otro panel -->
</div>

<button onclick="enviar()">Enviar Postulación</button>

`;

/* =========================
   ENVÍO GENÉRICO
========================= */
window.enviar = function(){

alert("✔ Postulación enviada (conecta aquí tu formulario dinámico)");

}

}

</script>

</body>
</html>
