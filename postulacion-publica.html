<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Postulación Staff | Buenos Aires RP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f3f4f6;
    color:#111827;
}

.container{
    max-width:700px;
    margin:40px auto;
    padding:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

h1{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    color:#6b7280;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:6px;
    border-radius:8px;
    border:1px solid #d1d5db;
    outline:none;
}

textarea{
    resize:none;
}

.option{
    margin-top:10px;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.cerrado{
    text-align:center;
    font-size:18px;
    color:#ef4444;
}

.gracias{
    text-align:center;
    font-size:20px;
    color:#16a34a;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<div id="contenido"></div>
</div>

<script>

const contenido = document.getElementById("contenido");

/* 🔥 ESTADO CORREGIDO */
let estado = localStorage.getItem("estado_postulacion");

if(!estado){
    estado = "cerrada";
}

const preguntas = JSON.parse(localStorage.getItem("preguntas")) || [];

// 🔥 identidad usuario
const discord = localStorage.getItem("discord_usuario");

let yaPostulo = false;

if(discord){

    const bloqueado = localStorage.getItem("postulante_" + discord);

    if(bloqueado === "si" && estado === "abierta"){
        yaPostulo = true;
    }
}

/* =========================
   BLOQUEO PRINCIPAL
========================= */

if(yaPostulo && estado === "abierta"){

contenido.innerHTML = `
<div class="card">
<div class="gracias">
🚫 Ya has enviado tu postulación.<br><br>
Solo se permite 1 formulario por persona.
</div>
</div>
`;

}else if(estado !== "abierta"){

contenido.innerHTML = `
<div class="card">
<div class="cerrado">
🔴 POSTULACIONES CERRADAS<br><br>
Actualmente no estamos aceptando nuevas solicitudes.
</div>
</div>
`;

}else{

let html = `
<div class="card">

<h1>🛡️ Postulación Staff</h1>
<div class="subtitle">Buenos Aires RP</div>

<label>Nombre</label>
<input id="nombre" placeholder="Tu nombre">

<label>Discord</label>
<input id="discord" placeholder="usuario#0000">

<div id="preguntas"></div>

<button onclick="enviar()">Enviar Postulación</button>

</div>
`;

contenido.innerHTML = html;

const contenedor = document.getElementById("preguntas");

preguntas.forEach((p,index)=>{

let bloque = `
<label>${index+1}. ${p.texto}</label>
`;

if(p.tipo === "texto"){
bloque += `
<textarea id="respuesta_${index}" placeholder="Escribe tu respuesta"></textarea>
`;
}else{
p.opciones.forEach(op=>{
bloque += `
<div class="option">
<input type="radio" name="respuesta_${index}" value="${op}">
${op}
</div>
`;
});
}

contenedor.innerHTML += bloque;

});

}

/* =========================
   🔥 SINCRONIZACIÓN EN TIEMPO REAL
========================= */

window.addEventListener("storage", () => {
    location.reload();
});

/* =========================
   ENVIAR FORMULARIO
========================= */

function enviar(){

const nombre = document.getElementById("nombre").value.trim();
const discordInput = document.getElementById("discord").value.trim();

if(!nombre || !discordInput){
alert("Completa los datos.");
return;
}

localStorage.setItem("discord_usuario", discordInput);

if(localStorage.getItem("postulante_" + discordInput) === "si"){
alert("Ya enviaste una postulación.");
return;
}

let respuestas = [];

preguntas.forEach((p,index)=>{

let respuesta = "";

if(p.tipo === "texto"){
respuesta = document.getElementById(`respuesta_${index}`).value;
}else{
const seleccionada = document.querySelector(`input[name="respuesta_${index}"]:checked`);
if(seleccionada) respuesta = seleccionada.value;
}

respuestas.push({
pregunta:p.texto,
respuesta
});

});

const postulaciones = JSON.parse(localStorage.getItem("postulaciones")) || [];

postulaciones.push({
id:Date.now(),
nombre,
discord: discordInput,
fecha:new Date().toLocaleDateString(),
respuestas,
estado:"Pendiente"
});

localStorage.setItem("postulaciones", JSON.stringify(postulaciones));

localStorage.setItem("postulante_" + discordInput, "si");

document.getElementById("contenido").innerHTML = `
<div class="card">
<div class="gracias">
🎉 ¡Postulación enviada con éxito!<br><br>
Gracias por completar el formulario.
</div>
</div>
`;

}

</script>

</body>
</html>
</body>
</html>
